server {
    listen 80;
    server_name _;

    root /home/debian/log-system/public;
    index index.php;
    charset utf-8;

    # =====================
    # RIO FUTURO DASHBOARDS
    # =====================
    location /dashboards/ {
        proxy_pass http://127.0.0.1:8501/dashboards/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    location /_stcore/ {
        proxy_pass http://127.0.0.1:8501/_stcore/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # API Rio Futuro (ruta específica para evitar conflicto con Laravel)
    location /api/v1/ {
        proxy_pass http://127.0.0.1:8000/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # =====================
    # DASHBOARD PRODUCCION (antiguo)
    # =====================
    location /dashboard_produccion/ {
        proxy_pass http://127.0.0.1:8504/dashboard_produccion/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # =====================
    # LOG SYSTEM / CARGAS (PHP)
    # =====================
    location /build/ {
        alias /home/debian/log-system/public/build/;
        try_files $uri $uri/ =404;
    }

    location /cargas {
        try_files $uri /index.php?$query_string;
    }

    # PHP handler
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Fallback para PHP (log-system)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }
}
